<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoiler Free Scores</title>
<meta name="description" content="Too many games. Find the good ones.">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --card:#1c2333; --border:#30363d;
    --text:#e6edf3; --muted:#7d8590;
    --green:#3fb950;  --green-bg:rgba(63,185,80,0.1);
    --blue:#388bfd;   --blue-bg:rgba(56,139,253,0.1);
    --orange:#f0883e; --orange-bg:rgba(240,136,62,0.1);
    --red:#f85149;    --red-bg:rgba(248,81,73,0.1);
    --purple:#bc8cff; --purple-bg:rgba(188,140,255,0.08);
    --yellow:#e3b341; --yellow-bg:rgba(227,179,65,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px);pointer-events:none;z-index:0;}
  .wrap{max-width:900px;margin:0 auto;padding:0 16px 80px;position:relative;z-index:1;}

  header{padding:40px 0 28px;border-bottom:1px solid var(--border);margin-bottom:28px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,60px);letter-spacing:0.04em;line-height:1;white-space:nowrap;}
  h1 .dim{color:var(--muted);} h1 .accent{color:var(--green);}
  .spoiler-pill{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);border:1px solid rgba(63,185,80,0.3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--green);margin-top:10px;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;}
  .spoiler-pill:hover{background:rgba(63,185,80,0.15);}
  .spoiler-pill.off{background:rgba(125,133,144,0.1);border-color:rgba(125,133,144,0.3);color:var(--muted);}
  .spoiler-pill.off .dot{background:var(--muted);animation:none;}
  .spoiler-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 22px;font-size:13px;font-weight:700;color:var(--text);box-shadow:0 4px 24px rgba(0,0,0,0.5);z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
  .spoiler-toast.show{opacity:1;}
  .spoiler-toast.toast-error{border-color:var(--red);color:var(--red);background:var(--red-bg);}
  .spoiler-toast.toast-success{border-color:var(--green);color:var(--green);background:var(--green-bg);}
  .spoiler-toast.toast-warn{border-color:var(--orange);color:var(--orange);background:var(--orange-bg);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

  .loading{text-align:center;padding:60px 20px;color:var(--muted);}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:var(--red-bg);border:1px solid rgba(248,81,73,0.3);border-radius:10px;padding:20px;color:var(--red);font-size:14px;text-align:center;display:none;}

  /* SPORT TABS */
  .sport-tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;flex-wrap:wrap;}
  /* sport tab styles defined below in scrolling tabs section */

  /* LEGEND */
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .legend-item{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid transparent;}

  /* HOW IT WORKS */
  .how-toggle{background:none;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:5px;transition:color 0.15s;}
  .how-toggle:hover{color:var(--text);}
  .how-toggle .arrow{display:inline-block;transition:transform 0.2s;font-size:10px;}
  .how-toggle.open .arrow{transform:rotate(90deg);}
  .how-panel{display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:20px;}
  .how-panel.open{display:block;}
  .how-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
  .how-item{display:flex;gap:10px;align-items:flex-start;}
  .how-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
  .how-text strong{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
  .how-text span{font-size:11px;color:var(--muted);line-height:1.5;}

  /* STATS */
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;flex:1;min-width:70px;text-align:center;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;margin-bottom:2px;}
  .stat-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}

  /* FILTERS — two rows for football */
  .filter-group{margin-bottom:20px;}
  .filter-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .filter-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;}
  .filter-btn:hover,.filter-btn.active{background:var(--surface);color:var(--text);border-color:rgba(255,255,255,0.2);}
  .filter-btn.league-active{background:var(--blue-bg);color:var(--blue);border-color:rgba(56,139,253,0.3);}

  /* SECTION LABEL */
  .section-label{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:24px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* LEAGUE SUBHEADING — inside football tab */
  .league-heading{font-size:13px;font-weight:700;color:var(--blue);margin:28px 0 10px;display:flex;align-items:center;gap:8px;letter-spacing:0.02em;}
  .league-heading::after{content:'';flex:1;height:1px;background:rgba(56,139,253,0.2);}

  /* UPCOMING DIVIDER */
  .upcoming-divider{display:flex;align-items:center;gap:12px;margin:32px 0 20px;font-size:13px;font-weight:600;color:var(--purple);}
  .upcoming-divider::before,.upcoming-divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(188,140,255,0.3),transparent);}

  /* GAME CARD */
  .game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:9px;display:flex;align-items:center;gap:14px;transition:transform 0.15s,box-shadow 0.15s;animation:fadeUp 0.35s ease both;position:relative;flex-wrap:nowrap;}
  .game-card:hover{transform:translateX(3px);box-shadow:0 4px 20px rgba(0,0,0,0.3);}

  /* DEBUG MODE */
  .debug-panel{display:none;width:100%;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;font-family:monospace;}
  .debug-score{font-size:13px;font-weight:700;color:var(--green);margin-bottom:6px;}
  .debug-factor{display:flex;justify-content:space-between;color:var(--muted);padding:1px 0;}
  .debug-factor span:last-child{color:var(--green);}
  .game-card.best-pick{box-shadow:0 0 0 1px rgba(63,185,80,0.25),0 4px 20px rgba(63,185,80,0.1);}
  .best-pick-badge{font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);border:1px solid rgba(63,185,80,0.25);border-radius:5px;padding:2px 6px;white-space:nowrap;flex-shrink:0;}
  .debug-toast{position:fixed;top:16px;right:16px;background:var(--card);border:1px solid var(--green);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;color:var(--green);z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none;}
  .debug-toast.show{opacity:1;}

  /* UPCOMING CARD */
  .upcoming-card{background:var(--purple-bg);border:1px solid rgba(188,140,255,0.2);border-left:3px solid var(--purple)!important;border-radius:12px;padding:14px 18px;margin-bottom:9px;display:flex;align-items:center;gap:14px;animation:fadeUp 0.35s ease both;}
  .upcoming-badge{display:flex;align-items:center;gap:5px;background:rgba(188,140,255,0.12);border:1px solid rgba(188,140,255,0.25);color:var(--purple);padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
  .kickoff-time{font-size:11px;color:var(--purple);font-weight:500;margin-top:2px;}

  .teams{flex:1;min-width:0;}
  .matchup{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .matchup .vs{color:var(--muted);font-weight:400;margin:0 5px;}
  .game-meta{font-size:11px;color:var(--muted);margin-top:2px;}

  .cat-badge{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
  .reveal-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background 0.15s,color 0.15s;font-family:'Outfit',sans-serif;}
  .reveal-btn:hover{background:rgba(255,255,255,0.06);color:var(--text);}
  .score-reveal{font-size:16px;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;display:none;flex-shrink:0;min-width:52px;text-align:center;}

  /* Must Watch — green (scorefest + watchworthy both show green) */
  .scorefest  {border-left:3px solid var(--green) !important;}
  .scorefest   .cat-badge{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,0.25);}
  .scorefest   .score-reveal{color:var(--green);}
  .watchworthy{border-left:3px solid var(--green) !important;}
  .watchworthy .cat-badge{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,0.25);}
  .watchworthy .score-reveal{color:var(--green);}

  /* Watchable — grey */
  .watchable  {border-left:3px solid var(--muted) !important;}
  .watchable   .cat-badge{background:rgba(125,133,144,0.1);color:var(--muted);border:1px solid rgba(125,133,144,0.2);}
  .watchable   .score-reveal{color:var(--muted);}

  /* Skip — muted red/blue (blowout + defensive both show same) */
  .blowout    {border-left:3px solid rgba(248,81,73,0.4) !important;}
  .blowout     .cat-badge{background:rgba(248,81,73,0.06);color:var(--muted);border:1px solid rgba(248,81,73,0.15);}
  .blowout     .score-reveal{color:var(--muted);}
  .defensive  {border-left:3px solid rgba(248,81,73,0.4) !important;}
  .defensive   .cat-badge{background:rgba(248,81,73,0.06);color:var(--muted);border:1px solid rgba(248,81,73,0.15);}
  .defensive   .score-reveal{color:var(--muted);}

  /* Sub-reason badge shown inside card */
  .sub-badge{font-size:10px;color:var(--muted);margin-top:2px;}

  .no-games{color:var(--muted);font-size:13px;padding:16px 0;}
  .sport-panel{display:none;}
  .sport-panel.active{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* TOP PICKS HERO */
  .top-picks-hero{margin-bottom:32px;}
  .top-picks-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .top-picks-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--text);}
  .top-picks-title span{color:var(--yellow);}
  .tp-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
  .tp-tab{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:0.04em;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;transition:all 0.15s;}
  .tp-tab.active{background:var(--green);color:#000;box-shadow:0 1px 4px rgba(63,185,80,0.4);}
  .tp-tab:hover:not(.active){color:var(--text);}
  .tp-empty{color:var(--muted);font-size:13px;padding:20px 0;text-align:center;}
  .tp-empty a{color:var(--yellow);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Outfit',sans-serif;font-size:13px;}
  .tp-empty-suggestion{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;}
  .tp-empty-suggestion span{font-size:13px;color:var(--muted);}
  .tp-suggest-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:all 0.15s;}
  .tp-suggest-btn:hover{border-color:var(--green);color:var(--green);}
  .top-picks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
  .top-pick-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;
    animation:fadeUp 0.3s ease both;cursor:default;
    transition:transform 0.15s,box-shadow 0.15s;
  }
  .top-pick-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
  /* Must Watch — both scorefest and watchworthy use green */
  .top-pick-card.watchworthy{border-left:3px solid var(--green)!important;}
  .top-pick-card.scorefest{border-left:3px solid var(--green)!important;}
  /* Skip — muted */
  .top-pick-card.watchable{border-left:3px solid var(--muted)!important;}
  .top-pick-card.defensive{border-left:3px solid rgba(248,81,73,0.4)!important;}
  .top-pick-card.blowout{border-left:3px solid rgba(248,81,73,0.4)!important;}
  .top-pick-card.best-pick{box-shadow:0 0 0 1px rgba(63,185,80,0.25),0 4px 20px rgba(63,185,80,0.1);}
  .tp-sport{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .tp-matchup{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.35;}
  .tp-meta{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .tp-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;margin-bottom:10px;}
  .watchworthy .tp-badge{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,0.25);}
  .scorefest   .tp-badge{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,0.25);}
  .watchable   .tp-badge{background:rgba(125,133,144,0.1);color:var(--muted);border:1px solid rgba(125,133,144,0.2);}
  .defensive   .tp-badge{background:rgba(125,133,144,0.1);color:var(--muted);border:1px solid rgba(125,133,144,0.2);}
  .blowout     .tp-badge{background:rgba(125,133,144,0.1);color:var(--muted);border:1px solid rgba(125,133,144,0.2);}
  .tp-reveal{background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;display:block;width:100%;text-align:center;}
  .tp-reveal:hover{background:rgba(255,255,255,0.06);color:var(--text);}
  .tp-score{font-size:18px;font-weight:700;font-family:'Bebas Neue',sans-serif;text-align:center;display:none;margin-top:6px;letter-spacing:0.05em;}
  .watchworthy .tp-score,.scorefest .tp-score{color:var(--green);}
  .watchable .tp-score,.defensive .tp-score,.blowout .tp-score{color:var(--muted);}

  /* ALL GAMES DIVIDER */
  .all-games-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;margin-top:8px;}
  .all-games-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.06em;color:var(--muted);}
  .all-games-header::after{content:'';flex:1;height:1px;background:var(--border);}


  /* LAST UPDATED */
  .last-updated{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .last-updated-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .refresh-btn{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;padding:2px 6px;border-radius:4px;transition:color 0.15s;display:inline-flex;align-items:center;gap:3px;}
  .refresh-btn:hover:not(:disabled){color:var(--text);}
  .refresh-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .refresh-btn.spinning{animation:spin 1s linear infinite;display:inline-block;}

  /* SETTINGS PANEL */
  .settings-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:12px;}
  .settings-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;gap:4px;transition:all 0.15s;}
  .settings-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
  .settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;display:none;}
  .settings-panel.open{display:block;}
  .settings-title{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .settings-actions{display:flex;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
  .sport-toggles{display:flex;gap:8px;flex-wrap:wrap;}
  .sport-toggle{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:600;color:var(--text);transition:all 0.15s;user-select:none;}
  .sport-toggle.hidden-sport{opacity:0.4;background:transparent;}
  .sport-toggle:hover{border-color:rgba(255,255,255,0.2);}

  /* WATCHED TOGGLE */
  .watched-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:4px;opacity:0.3;transition:opacity 0.2s;flex-shrink:0;line-height:1;}
  .watched-btn:hover{opacity:0.7;}
  .watched-btn.watched{opacity:1;color:var(--green);}
  .game-card.is-watched{opacity:0.4;}
  .game-card.is-watched .matchup{text-decoration:line-through;}

  /* SCROLLING TABS — primary sport nav, big and obvious */
  .sport-tabs{display:flex;border:1px solid var(--border);border-radius:12px;overflow-x:auto;overflow-y:hidden;margin-bottom:20px;scrollbar-width:none;background:var(--surface);}
  .sport-tabs::-webkit-scrollbar{display:none;}
  .sport-tab{flex:0 0 auto;padding:14px 14px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);background:transparent;border:none;font-family:'Outfit',sans-serif;transition:background 0.2s,color 0.2s;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;letter-spacing:0.01em;}
  .sport-tab:not(:last-child){border-right:1px solid var(--border);}
  .sport-tab:hover{color:var(--text);background:var(--card);}
  .sport-tab.active{background:var(--card);color:var(--text);box-shadow:inset 0 -2px 0 var(--green);}
  .tab-count{background:rgba(255,255,255,0.08);border-radius:10px;padding:1px 6px;font-size:10px;color:var(--muted);font-weight:600;}
  .sport-tab.active .tab-count{background:var(--green-bg);color:var(--green);}

  @media(max-width:560px){
    h1{font-size:clamp(24px,8vw,40px);}
    .game-card{flex-wrap:wrap;gap:10px;padding:14px 14px;}
    .teams{width:100%;}
    .matchup{font-size:13px;white-space:normal;}
    .cat-badge{font-size:10px;padding:4px 9px;}
    .reveal-btn{font-size:10px;padding:4px 9px;}
    .score-reveal{font-size:14px;min-width:40px;}
    .upcoming-card{flex-wrap:wrap;gap:8px;padding:12px 14px;}
    .upcoming-badge{font-size:10px;padding:4px 9px;}
    .stat-num{font-size:20px;}

<script>
  // ── CATEGORY DISPLAY MAPPING ──────────────────────────────────────────
  // cls values drive sorting/filtering internally — labels are what users see
  // badge is the supplementary reason shown under the main label
  const CAT_DISPLAY = {
    scorefest:   { label: 'Must Watch', icon: '👀', cls: 'scorefest',   badge: '🔥 Score Fest'  },
    watchworthy: { label: 'Must Watch', icon: '👀', cls: 'watchworthy', badge: null             },
    watchable:   { label: 'Watchable',  icon: '😐', cls: 'watchable',   badge: null             },
    defensive:   { label: 'Skip',       icon: '⏭',  cls: 'defensive',   badge: '🧱 Low Scoring' },
    blowout:     { label: 'Skip',       icon: '⏭',  cls: 'blowout',     badge: '🎯 Blowout'     },
  };

  function makeCat(cls) {
    return CAT_DISPLAY[cls] || CAT_DISPLAY.watchable;
  }

  // ── CATEGORY RULES ────────────────────────────────────────────────────
  function categorizeFootball(h, a) {
    const total = h+a, diff = Math.abs(h-a);
    if (total >= 6)               return makeCat('scorefest');
    if (total <= 2)               return makeCat('defensive');
    if (diff >= 3)                return makeCat('blowout');
    if (diff === 1 && total >= 4) return makeCat('watchworthy');
    return                               makeCat('watchable');
  }

  const categorizeSoccer = categorizeFootball;

  function categorizeNBA(h, a) {
    const total = h+a, diff = Math.abs(h-a);
    if (total >= 220 && diff <= 7) return makeCat('scorefest');
    if (total <= 200)              return makeCat('defensive');
    if (diff >= 16)                return makeCat('blowout');
    if (diff <= 7)                 return makeCat('watchworthy');
    return                                makeCat('watchable');
  }

  function categorizeNFL(h, a) {
    const total = h+a, diff = Math.abs(h-a);
    if (total >= 50 && diff <= 7) return makeCat('scorefest');
    if (total <= 20)              return makeCat('defensive');
    if (diff >= 17)               return makeCat('blowout');
    if (diff <= 7)                return makeCat('watchworthy');
    return                               makeCat('watchable');
  }

  function categorizeMLB(h, a) {
    const total = h+a, diff = Math.abs(h-a);
    if (total >= 10)              return makeCat('scorefest');
    if (total <= 3)               return makeCat('defensive');
    if (diff >= 4)                return makeCat('blowout');
    if (diff === 1 && total >= 5) return makeCat('watchworthy');
    return                               makeCat('watchable');
  }

  function categorizeNHL(h, a) {
    const total = h+a, diff = Math.abs(h-a);
    if (total >= 8)               return makeCat('scorefest');
    if (total <= 3)               return makeCat('defensive');
    if (diff >= 3)                return makeCat('blowout');
    if (diff === 1 && total >= 4) return makeCat('watchworthy');
    return                               makeCat('watchable');
  }

  // Tennis: categorize by sets won & set scores
  // sets = [{h, a}, ...] — each set's game counts
  function categorizeTennis(homeSets, awaySets, sets) {
    const totalSets = homeSets + awaySets;
    const loserSets = Math.min(homeSets, awaySets);
    // Tiebreak sets — any set decided in a tiebreak (7-6)
    const hasTiebreak = sets.some(s => s.h === 7 || s.a === 7);
    // Close sets: decided by 2 games or fewer (including tiebreaks)
    const closeSets = sets.filter(s => Math.abs(s.h - s.a) <= 2).length;
    // Bagel (6-0) or breadstick (6-1) — dominant
    const hasBagel      = sets.some(s => (s.h === 6 && s.a === 0) || (s.a === 6 && s.h === 0));
    const hasBreadstick = sets.some(s => (s.h === 6 && s.a === 1) || (s.a === 6 && s.h === 1));

    // Epic 5-setter (Grand Slam)
    if (totalSets >= 5) return { ...makeCat('scorefest'), badge: '🎾 Epic 5-setter' };

    // Any 3-setter is at least a Must Watch
    if (totalSets >= 3 && loserSets >= 1) return { ...makeCat('watchworthy'), badge: '🎾 3-setter' };

    // Straight sets with tiebreak(s)
    if (loserSets === 0 && hasTiebreak) return { ...makeCat('watchworthy'), badge: '🎾 Tiebreak' };

    // Dominant straight-set win — bagel or breadstick
    if (loserSets === 0 && (hasBagel || hasBreadstick) && !hasTiebreak)
      return { ...makeCat('blowout'), badge: '🎯 Bagel' };

    // Straight sets, close-ish
    if (loserSets === 0 && closeSets >= 2) return makeCat('watchable');

    // Straight sets, not close
    if (loserSets === 0) return makeCat('blowout');

    return makeCat('watchable');
  }

  const HOW_DEFS = {

    const mins = Math.floor((Date.now() - loadedAt) / 60000);
    const txt = mins < 1 ? 'Just updated' : mins === 1 ? 'Updated 1 min ago' : `Updated ${mins} mins ago`;
    const el = document.getElementById('last-updated-text');
    if (el) el.textContent = txt;

    // Update refresh button state
    const btn = document.getElementById('refresh-btn');
    if (btn) btn.disabled = Date.now() < refreshCooldownUntil;
  }

  async function refreshNow() {
    const btn = document.getElementById('refresh-btn');
    if (!btn || btn.disabled) return;

    btn.disabled = true;
    btn.textContent = '↻';
    btn.classList.add('spinning');

    try {
      const res = await fetch('/.netlify/functions/refresh-scores', { method: 'POST' });
      const result = await res.json();

      if (res.status === 429) {
        showToast(`⏱ ${result.message}`, 'warn');
        if (result.fetchedAt) loadedAt = result.fetchedAt;
      } else if (result.ok) {
        showToast('✓ Scores refreshed', 'success');
        refreshCooldownUntil = Date.now() + 5 * 60 * 1000;
        await loadScores();
      } else {
        showToast('⚠️ Refresh failed, try again', 'error');
        btn.disabled = false;
      }
    } catch (err) {
      showToast('⚠️ Refresh failed', 'error');
      btn.disabled = false;
    }

    btn.classList.remove('spinning');
    btn.textContent = '↻';
  }

  function applyTimelineCat(g, scoreCat) {
    if (!g.timelineCat) return scoreCat;
    const override = TIMELINE_CAT_MAP[g.timelineCat];
    if (!override) return scoreCat;
    const scoreR = TIMELINE_RANK[scoreCat.cls] ?? 2;
    const overR  = TIMELINE_RANK[g.timelineCat] ?? 2;
    return overR > scoreR ? override : scoreCat;
  }

  function processSportData(data, sport) {
    try {
    const apiKey = API_KEY[sport];
    if (sport === 'cricket') {
      const raw = data.cricket || { recent:[], upcoming:[] };
      allData.cricket = {
        recent: (raw.recent||[]).map(g => {
          const scoreCat = categorizeCricket(g.resultMargin, g.resultType, g.maxInnings);
          return { ...g, cat: applyTimelineCat(g, scoreCat) };
        }),
        upcoming: raw.upcoming || [],
      };
      const el = document.getElementById('cricket-count');
      if (el) el.textContent = allData.cricket.recent.length;
      buildFilters('cricket');
      renderCricket();
    } else if (sport === 'tennis') {
      const raw = data.tennis || { recent:[], upcoming:[] };
      allData.tennis = {
        recent:   (raw.recent||[]).map(g => ({ ...g, cat: categorizeTennis(g.homeSets, g.awaySets, g.sets||[]) })),
        upcoming: raw.upcoming || [],
      };
      const el = document.getElementById('tennis-count');
      if (el) el.textContent = allData.tennis.recent.length;
      buildFilters('tennis');
      renderTennis();
    } else {
      // football and nhl get timeline override applied
      const useTimeline = sport === 'football' || sport === 'nhl' || sport === 'nba';
      allData[sport] = {
        recent: (data[apiKey]?.recent || []).map(g => {
          const scoreCat = SPORTS[sport].cat(g.h, g.a);
          return { ...g, cat: useTimeline ? applyTimelineCat(g, scoreCat) : scoreCat };
        }),
        upcoming: data[apiKey]?.upcoming || [],
      };
      const el = document.getElementById(`${sport}-count`);
      if (el) el.textContent = allData[sport].recent.length;
      buildFilters(sport);
      renderGames(sport);
    }
    } catch(err) {
      console.error(`processSportData failed for ${sport}:`, err);
    }
  }

  async function loadScores() {
    try {
      buildSportTabs();

      // Single fetch — blob cache makes this near-instant
      const res = await fetch(`/.netlify/functions/get-scores?sport=all`);
      if (!res.ok) throw new Error('Bad response');
      const data = await res.json();

      // Use server's fetch timestamp if available (from blob cache)
      const serverFetchedAt = res.headers.get('X-Fetched-At');
      loadedAt = serverFetchedAt ? new Date(serverFetchedAt).getTime() : Date.now();

      // Process all sports at once
      ALL_SPORTS.forEach(s => processSportData(data, s.key));

      renderTopPicks();

      document.getElementById('loading').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      updateLastUpdatedText();
      setInterval(updateLastUpdatedText, 60000);

    } catch(err) {
      console.error(err);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-box').style.display = 'block';
    }
  }

  // ── TOP PICKS HERO ─────────────────────────────────────────────────────
  const SPORT_LABELS = {
    football:'⚽ Football', nhl:'🏒 NHL', mlb:'⚾ MLB',
    nba:'🏀 NBA', nfl:'🏈 NFL', cricket:'🏏 Cricket', tennis:'🎾 Tennis'
  };

  // Priority order for picks: scorefest > watchworthy > watchable
  const CAT_RANK = { scorefest:3, watchworthy:2, watchable:1, defensive:0, blowout:0 };

  // Sort games within a group by excitement:
  // Priority: 1. Category rank  2. Closer margin  3. Higher scoring  4. Most recent
  // Works for all sports — uses resultMargin for cricket, h/a diff for everything else
  function sortByExcitement(games) {
    return [...games].sort((a, b) => {
      const rankDiff = (CAT_RANK[b.cat?.cls] ?? 0) - (CAT_RANK[a.cat?.cls] ?? 0);
      if (rankDiff !== 0) return rankDiff;

      // Get margin — cricket uses resultMargin directly, others use score diff
      const aMargin = a.resultMargin != null ? a.resultMargin
                    : Math.abs((a.h ?? 0) - (a.a ?? 0));
      const bMargin = b.resultMargin != null ? b.resultMargin
                    : Math.abs((b.h ?? 0) - (b.a ?? 0));

      // Closer margin wins (ascending)
      if (aMargin !== bMargin) return aMargin - bMargin;

      // Higher scoring as tiebreaker (descending)
      const aTotal = (a.h ?? 0) + (a.a ?? 0) + (a.maxInnings ?? 0);
      const bTotal = (b.h ?? 0) + (b.a ?? 0) + (b.maxInnings ?? 0);
      if (bTotal !== aTotal) return bTotal - aTotal;

      return b.ts - a.ts;
    });
  }

  let tpWindow = 'today'; // today | recent | week

  function setTpWindow(w) {
    tpWindow = w;
    // Always highlight the correct tab by data, not by which element was clicked
    document.querySelectorAll('.tp-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.window === w);
    });
    renderTopPicks();
  }

  // Tier 1 leagues always get priority slots in football Top Picks
  const FOOTBALL_TIER1 = new Set(['Champions League', 'Premier League']);

  function getTopPicksGames() {
    const now = Date.now();
    const DAY  = 86400000;
    const windows = { today: 1*DAY, recent: 7*DAY, week: 10*DAY };
    const cutoff = now - windows[tpWindow];

    const games = allData[activeSport]?.recent || [];
    const candidates = games
      .filter(g => g.ts >= cutoff && (g.cat?.cls === 'scorefest' || g.cat?.cls === 'watchworthy'))      .sort((a, b) => {
        // For football, Tier 1 leagues rank above everything else
        if (activeSport === 'football') {
          const aTier1 = FOOTBALL_TIER1.has(a.league) ? 1 : 0;
          const bTier1 = FOOTBALL_TIER1.has(b.league) ? 1 : 0;
          if (bTier1 !== aTier1) return bTier1 - aTier1;
        }
        const rankDiff = (CAT_RANK[b.cat?.cls] ?? 0) - (CAT_RANK[a.cat?.cls] ?? 0);
        if (rankDiff !== 0) return rankDiff;
        const aDiff  = Math.abs((a.h ?? 0) - (a.a ?? 0));
        const bDiff  = Math.abs((b.h ?? 0) - (b.a ?? 0));
        const aTotal = (a.h ?? 0) + (a.a ?? 0) + (a.homeSets ?? 0) + (a.awaySets ?? 0);
        const bTotal = (b.h ?? 0) + (b.a ?? 0) + (b.homeSets ?? 0) + (b.awaySets ?? 0);
        if (b.cat?.cls === 'scorefest' && aDiff !== bDiff) return aDiff - bDiff;
        if (bTotal !== aTotal) return bTotal - aTotal;
        return b.ts - a.ts;
      });

    // One per league, but ensure at least 1-2 Tier 1 games if available
    const seenLeagues = new Set();
    const picks = [];
    const tier1Games = candidates.filter(g => FOOTBALL_TIER1.has(g.league));
    const otherGames = candidates.filter(g => !FOOTBALL_TIER1.has(g.league));

    // Fill up to 2 Tier 1 slots first (if football)
    if (activeSport === 'football') {
      for (const g of tier1Games) {
        if (picks.length >= 2) break;
        if (seenLeagues.has(g.league)) continue;
        seenLeagues.add(g.league);
        picks.push(g);
      }
    }

    // Fill remaining slots from all games (one per league)
    for (const g of candidates) {
      if (picks.length >= 3) break;
      if (seenLeagues.has(g.league)) continue;
      seenLeagues.add(g.league);
      picks.push(g);
    }

    return picks.slice(0, 3).map(g => ({ ...g, sport: activeSport }));
  }

  function tpScoreStr(g) {
    if (g.sport === 'cricket') return g.status || '';
    if (g.sport === 'tennis') {
      const sets = (g.sets||[]).map(s=>`${s.h}-${s.a}`).join(' ');
      return `${g.homeSets}–${g.awaySets}${sets ? ' ('+sets+')' : ''}`;
    }
    return `${g.h} – ${g.a}`;
  }

  function renderTopPicks() {
    const container = document.getElementById('top-picks-container');
    if (!container) return;

    const picks = getTopPicksGames();
    const nextWindow = tpWindow === 'today' ? 'recent' : tpWindow === 'recent' ? 'week' : null;
    const nextLabel  = tpWindow === 'today' ? 'Recent' : 'This Week';

    const suggestionHTML = nextWindow
      ? `<div class="tp-empty-suggestion" style="margin-top:10px">
           <span>${picks.length === 1 ? 'Only 1 result. More in' : 'No standout games ${tpWindow === "today" ? "today" : "in this window"}. Check'} ${nextLabel}.</span>
           <button class="tp-suggest-btn" onclick="setTpWindow('${nextWindow}')">
             ${nextLabel} →
           </button>
         </div>`
      : '';

    if (picks.length === 0) {
      container.innerHTML = nextWindow
        ? `<div class="tp-empty-suggestion">
             <span>No standout games ${tpWindow === 'today' ? 'today' : 'in this window'}.</span>
             <button class="tp-suggest-btn" onclick="setTpWindow('${nextWindow}')">Check ${nextLabel} →</button>
           </div>`
        : `<div class="tp-empty">No standout games this week.</div>`;
      return;
    }

    container.innerHTML = `<div class="top-picks-grid">
      ${picks.map((g, i) => {
        const scoreStr = tpScoreStr(g).replace(/"/g, '&quot;');
        const isTennis  = g.sport === 'tennis';
        const isCricket = g.sport === 'cricket';
        const revealAttr = isCricket
          ? `data-cricket="${scoreStr}"`
          : isTennis
            ? `data-tennis="${scoreStr}"`
            : `data-h="${g.h}" data-a="${g.a}"`;
        const dateLabel = g.date || g.dateStr || '';
        const leagueLabel = g.league || g.leagueName || g.tournament || '';
        return `
          <div class="top-pick-card ${g.cat.cls}${i === 0 ? ' best-pick' : ''}" style="animation-delay:${i*0.06}s">
            <div class="tp-sport">${leagueLabel}</div>
            <div class="tp-matchup">${g.home} vs ${g.away}</div>
            <div class="tp-meta">${dateLabel}</div>
            <div class="tp-badge">${g.cat.icon} ${g.cat.label}${g.cat.badge ? ' · ' + g.cat.badge : ''}</div>
            <button class="tp-reveal" ${revealAttr} onclick="revealTpCard(this)">👁 Reveal</button>
            <div class="tp-score"></div>
          </div>`;
      }).join('')}
    </div>${picks.length === 1 && nextWindow ? suggestionHTML : ''}`;
  }

  function revealTpCard(btn) {
    if (spoilerBlocked(btn)) return;
    const scoreEl = btn.nextElementSibling;
    if (scoreEl.style.display === 'block') {
      scoreEl.style.display = 'none';
      btn.innerHTML = '👁 Reveal';
    } else {
      if (btn.dataset.cricket) {
        scoreEl.style.fontFamily = "'Outfit',sans-serif";
        scoreEl.style.fontSize = '11px';
        scoreEl.textContent = btn.dataset.cricket;
      } else if (btn.dataset.tennis) {
        scoreEl.style.fontFamily = "'Outfit',sans-serif";
        scoreEl.style.fontSize = '12px';
        scoreEl.textContent = btn.dataset.tennis;
      } else {
        scoreEl.textContent = `${btn.dataset.h} – ${btn.dataset.a}`;
      }
      scoreEl.style.display = 'block';
      btn.innerHTML = '🙈 Hide';
    }
  }

  // ── RENDER ─────────────────────────────────────────────────────────────
  function renderGames(sport) {
    const {recent, upcoming} = allData[sport];
    const container = document.getElementById(`${sport}-games`);
    const now = Date.now();
    let html = '';

    if (sport === 'football') {
      // Apply both category and league filters
      let filtered = recent;
      if (state.football.cat !== 'all') {
        const allowed = FILTER_CLS_MAP[state.football.cat] || [];
        filtered = filtered.filter(g => allowed.includes(g.cat.cls));
      }
      if (state.football.league !== 'all') filtered = filtered.filter(g => g.league === state.football.league);

      if (filtered.length === 0) {
        html += '<p class="no-games">No games found for this filter.</p>';
      } else if (state.football.league === 'all') {
        const bestPick = sortByExcitement(filtered)[0];
        const byDate = {};
        filtered.forEach(g => {
          const key = g.dateKey || g.date;
          if (!byDate[key]) byDate[key] = { games: [], maxTs: 0, label: g.date };
          byDate[key].games.push(g);
          if (g.ts > byDate[key].maxTs) byDate[key].maxTs = g.ts;
        });
        Object.entries(byDate)
          .sort(([, a], [, b]) => b.maxTs - a.maxTs)
          .forEach(([, { games, label }]) => {
            html += `<div class="section-label">${label}</div>`;
            html += sortByExcitement(games).map((g, i) => gameCardHTML(g, i, g===bestPick)).join('');
          });
      } else {
        // Specific league: group by UTC date key, newest first
        const byDate = {};
        filtered.forEach(g => {
          const key = g.dateKey || g.date;
          if (!byDate[key]) byDate[key] = { games: [], maxTs: 0, label: g.date };
          byDate[key].games.push(g);
          if (g.ts > byDate[key].maxTs) byDate[key].maxTs = g.ts;
        });
        Object.entries(byDate)
          .sort(([, a], [, b]) => b.maxTs - a.maxTs)
          .forEach(([, { games, label }]) => {
            html += `<div class="section-label">${label}</div>`;
            html += sortByExcitement(games).map((g, i) => gameCardHTML(g, i)).join('');
          });
      }

      // Upcoming — filter by league only (no scores yet to filter by category)
      let upcomingFiltered = upcoming;
      if (state.football.league !== 'all') upcomingFiltered = upcomingFiltered.filter(g => g.league === state.football.league);

      if (upcomingFiltered.length > 0) {
        html += `<div class="upcoming-divider">📅 Coming Up This Week</div>`;
        const byDate = {};
        upcomingFiltered.forEach(g => {
          const key = g.dateKey || g.date;
          if (!byDate[key]) byDate[key] = { games: [], maxTs: 0, label: g.date };
          byDate[key].games.push(g);
          if (g.ts > byDate[key].maxTs) byDate[key].maxTs = g.ts;
        });
        Object.entries(byDate)
          .sort(([, a], [, b]) => a.maxTs - b.maxTs)
          .forEach(([, { games, label }]) => {
            html += `<div class="section-label">${label}</div>`;
            html += games.map((g, i) => upcomingCardHTML(g, i)).join('');
          });
      }

    } else {
      // Standard sport rendering
      const filter = state[sport].cat;
      const filtered = filter === 'all' ? recent : recent.filter(g => {
        const allowed = FILTER_CLS_MAP[filter] || [];
        return allowed.includes(g.cat.cls);
      });

      if (filtered.length === 0) {
        html += '<p class="no-games">No games found for this category.</p>';
      } else {
        // Find the best pick — top game by excitement across all dates
        const bestPick = sortByExcitement(filtered)[0];
        const byDate = {};
        filtered.forEach(g => { if(!byDate[g.date]) byDate[g.date]=[]; byDate[g.date].push(g); });
        Object.keys(byDate).sort((a,b) => byDate[b][0].ts - byDate[a][0].ts).forEach(date => {
          html += `<div class="section-label">${date}</div>`;
          html += sortByExcitement(byDate[date]).map((g,i) => gameCardHTML(g,i, g===bestPick)).join('');
        });
      }

      if (upcoming.length > 0) {
        html += `<div class="upcoming-divider">📅 Coming Up This Week</div>`;
        const byDate = {};
        upcoming.forEach(g => { if(!byDate[g.date]) byDate[g.date]=[]; byDate[g.date].push(g); });
        Object.entries(byDate).forEach(([date, dayGames]) => {
          html += `<div class="section-label">${date}</div>`;
          html += dayGames.map((g,i) => upcomingCardHTML(g,i)).join('');
        });
      }
    }

    container.innerHTML = html;
  }

  // ── DEBUG MODE ─────────────────────────────────────────────────────────
  let debugMode = false;
  let debugToastTimer;

  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'D') {
      e.preventDefault();
      debugMode = !debugMode;
      document.body.classList.toggle('debug-mode', debugMode);
      const toast = document.getElementById('debug-toast');
      toast.textContent = debugMode ? '🔍 Debug Mode ON' : '🔍 Debug Mode OFF';
      toast.classList.add('show');
      clearTimeout(debugToastTimer);
      debugToastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
      // Re-render current sport to show/hide debug panels
      if (allData[activeSport]) {
        if (activeSport === 'cricket') renderCricket();
        else if (activeSport === 'tennis') renderTennis();
        else renderGames(activeSport);
      }
    }
  });

  function debugPanelHTML(g) {
    if (!g.confidence) return '';
    const { score, factors } = g.confidence;
    const bar = '█'.repeat(Math.round(score / 10)) + '░'.repeat(10 - Math.round(score / 10));
    return `
      <div class="debug-panel">
        <div class="debug-score">Confidence: ${score}/100 ${bar}</div>
        ${factors.map(f => `
          <div class="debug-factor">
            <span>${f.label}</span>
            <span>+${f.points}</span>
          </div>`).join('')}
        ${g.debug ? `<div class="debug-factor" style="margin-top:4px;color:var(--blue)">
          <span>Lead changes: ${g.debug.leadChanges ?? '—'} · Largest lead: ${g.debug.largestLead ?? '—'}${g.debug.hasOT ? ' · OT' : ''}${g.debug.hadComeback ? ' · Comeback' : ''}</span>
        </div>` : ''}
      </div>`;
  }

  function gameCardHTML(g, i, isBestPick = false) {
    const gameId = makeGameId(g);
    const isWatched = watched.has(gameId);
    const safeId = gameId.replace(/'/g, "\\'");
    return `
      <div class="game-card ${g.cat.cls}${isWatched?' is-watched':''}${isBestPick?' best-pick':''}" style="animation-delay:${i*0.04}s;flex-wrap:wrap;">
        <div class="teams" style="flex:1;min-width:0;">
          <div class="matchup">${g.home} <span class="vs">vs</span> ${g.away}</div>
          <div class="game-meta">${g.date} · ${g.league}${g.cat.badge ? ' · <span class="sub-badge">' + g.cat.badge + '</span>' : ''}</div>
        </div>
        ${isBestPick ? '<div class="best-pick-badge">⭐ Top Pick</div>' : ''}
        <div class="cat-badge">${g.cat.icon} ${g.cat.label}</div>
        <button class="reveal-btn" onclick="toggleScore(this,${g.h},${g.a})">👁 Reveal</button>
        <div class="score-reveal"></div>
        <button class="watched-btn${isWatched?' watched':''}" title="Mark as watched" onclick="toggleWatched(this,'${safeId}')">✓</button>
        ${debugPanelHTML(g)}
      </div>`;
  }

  function upcomingCardHTML(g, i) {
    return `
      <div class="upcoming-card" style="animation-delay:${i*0.04}s">
        <div class="teams">
          <div class="matchup">${g.home} <span class="vs">vs</span> ${g.away}</div>
          <div class="game-meta">${g.league}</div>
          <div class="kickoff-time">🕐 ${g.time}</div>
        </div>
        <div class="upcoming-badge">📅 Upcoming</div>
      </div>`;
  }

  // ── SPOILER MODE ───────────────────────────────────────────────────────
  let spoilerMode = localStorage.getItem('spoilerMode') !== 'off';

  function toggleSpoilerMode() {
    spoilerMode = !spoilerMode;
    localStorage.setItem('spoilerMode', spoilerMode ? 'on' : 'off');
    const pill = document.getElementById('spoiler-pill');
    const status = document.getElementById('spoiler-status');
    pill.classList.toggle('off', !spoilerMode);
    status.textContent = spoilerMode ? 'ON' : 'OFF';
    showToast(spoilerMode ? '🛡 Spoiler-Free Mode ON' : '👁 Spoiler-Free Mode OFF — scores visible');
  }

  // Apply saved spoiler mode state on load
  function initSpoilerPill() {
    if (!spoilerMode) {
      const pill = document.getElementById('spoiler-pill');
      const status = document.getElementById('spoiler-status');
      pill.classList.add('off');
      status.textContent = 'OFF';
    }
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const toast = document.getElementById('spoiler-toast');
    toast.textContent = msg;
    toast.classList.remove('toast-error', 'toast-success', 'toast-warn');
    if (type) toast.classList.add(`toast-${type}`);
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.classList.remove('toast-error','toast-success','toast-warn'), 200);
    }, 3000);
  }

  function spoilerBlocked(btn) {
    if (!spoilerMode) return false;
    showToast('🛡 Turn off Spoiler-Free Mode to reveal scores');
    // Briefly shake the pill to draw attention
    const pill = document.getElementById('spoiler-pill');
    pill.style.transform = 'scale(1.08)';
    setTimeout(() => pill.style.transform = '', 200);
    return true;
  }

  function toggleScore(btn, h, a) {
    if (spoilerBlocked(btn)) return;
    const el = btn.nextElementSibling;
    if (el.style.display === 'block') { el.style.display='none'; btn.textContent='👁 Reveal'; }
    else { el.textContent=`${h} – ${a}`; el.style.display='block'; btn.textContent='🙈 Hide'; }
  }

  function toggleCricketScore(btn, status) {
    if (spoilerBlocked(btn)) return;
    const el = btn.nextElementSibling;
    if (el.style.display === 'block') { el.style.display='none'; btn.textContent='👁 Reveal'; }
    else { el.textContent = status; el.style.display='block'; btn.textContent='🙈 Hide'; }
  }

  function toggleTennisScore(btn, scoreStr) {
    if (spoilerBlocked(btn)) return;
    const el = btn.nextElementSibling;
    if (el.style.display === 'block') { el.style.display='none'; btn.textContent='👁 Reveal'; }
    else { el.textContent = scoreStr; el.style.display='block'; btn.textContent='🙈 Hide'; }
  }

  function renderCricket() {
    const { recent, upcoming } = allData.cricket;
    const container = document.getElementById('cricket-games');
    const filter = state.cricket.cat;
    const filtered = filter === 'all' ? recent : recent.filter(g => {
      const allowed = FILTER_CLS_MAP[filter] || [];
      return allowed.includes(g.cat.cls);
    });
    const bestPick = sortByExcitement(filtered)[0];

    let html = '';

    if (filtered.length === 0) {
      html += '<p class="no-games">No T20 matches found for this category.</p>';
    } else {
      // Group by league
      const byLeague = {};
      filtered.forEach(g => {
        if (!byLeague[g.league]) byLeague[g.league] = [];
        byLeague[g.league].push(g);
      });

      Object.entries(byLeague).forEach(([league, games]) => {
        html += `<div class="league-heading">${league}</div>`;
        sortByExcitement(games).forEach((g, i) => {
          const safeStatus = g.status.replace(/'/g, "\\'");
          const gameId = makeGameId(g);
          const isWatched = watched.has(gameId);
          const safeId = gameId.replace(/'/g, "\\'");
          html += `
            <div class="game-card ${g.cat.cls}${isWatched?' is-watched':''}${g===bestPick?' best-pick':''}" style="animation-delay:${i*0.04}s;flex-wrap:wrap;">
              <div class="teams" style="flex:1;min-width:0;">
                <div class="matchup">${g.home} <span class="vs">vs</span> ${g.away}</div>
                <div class="game-meta">${g.dateStr} · ${g.league}</div>
              </div>
              ${g===bestPick ? '<div class="best-pick-badge">⭐ Top Pick</div>' : ''}
              <div class="cat-badge">${g.cat.icon} ${g.cat.label}</div>
              <button class="reveal-btn" onclick="toggleCricketScore(this,'${safeStatus}')">👁 Reveal</button>
              <div class="score-reveal" style="font-family:'Outfit',sans-serif;font-size:11px;white-space:normal;max-width:160px;line-height:1.4;text-align:right;"></div>
              <button class="watched-btn${isWatched?' watched':''}" title="Mark as watched" onclick="toggleWatched(this,'${safeId}')">✓</button>
            </div>`;
        });
      });
    }

    // Upcoming
    if (upcoming.length > 0) {
      html += `<div class="upcoming-divider">📅 Coming Up</div>`;
      const byLeague = {};
      upcoming.forEach(g => {
        if (!byLeague[g.league]) byLeague[g.league] = [];
        byLeague[g.league].push(g);
      });
      Object.entries(byLeague).forEach(([league, games]) => {
        html += `<div class="league-heading">${league}</div>`;
        html += games.map((g, i) => `
          <div class="upcoming-card" style="animation-delay:${i*0.04}s">
            <div class="teams">
              <div class="matchup">${g.home} <span class="vs">vs</span> ${g.away}</div>
              <div class="game-meta">${g.league}</div>
              <div class="kickoff-time">🕐 ${g.timeStr}</div>
            </div>
            <div class="upcoming-badge">📅 Upcoming</div>
          </div>`).join('');
      });
    }

    container.innerHTML = html;
  }

  function renderTennis() {
    const { recent, upcoming } = allData.tennis;
    const container = document.getElementById('tennis-games');
    if (!container) return;
    const filter = state.tennis.cat;
    const tour   = state.tennis.tour || 'all';

    let filtered = filter === 'all' ? recent : recent.filter(g => {
      const allowed = FILTER_CLS_MAP[filter] || [];
      return allowed.includes(g.cat.cls);
    });
    if (tour !== 'all') filtered = filtered.filter(g => g.league === tour);

    const bestPick = sortByExcitement(filtered)[0];
    let html = '';

    function setScoreStr(g) {
      if (!g.sets || g.sets.length === 0) return `${g.homeSets}–${g.awaySets}`;
      const setStr = g.sets.map(s => `${s.h}-${s.a}`).join(', ');
      return `${g.homeSets}–${g.awaySets} sets (${setStr})`;
    }

    if (filtered.length === 0) {
      html += '<p class="no-games">No tennis matches found for this category.</p>';
    } else {
      const byLeague = {};
      filtered.forEach(g => {
        if (!byLeague[g.league]) byLeague[g.league] = [];
        byLeague[g.league].push(g);
      });

      Object.entries(byLeague).forEach(([league, games]) => {
        html += `<div class="league-heading">${league === 'ATP' ? '🎾 ATP' : '🎾 WTA'} — ${league}</div>`;

        const byTournament = {};
        games.forEach(g => {
          const t = g.tournament || 'Tournament';
          if (!byTournament[t]) byTournament[t] = [];
          byTournament[t].push(g);
        });

        Object.entries(byTournament).forEach(([tournament, tGames]) => {
          html += `<div class="section-label">${tournament}${tGames[0].round ? ' · ' + tGames[0].round : ''}</div>`;
          tGames.forEach((g, i) => {
            const safeScore = setScoreStr(g).replace(/'/g, "\\'");
            const gameId = makeGameId(g);
            const isWatched = watched.has(gameId);
            const safeId = gameId.replace(/'/g, "\\'");
            html += `
              <div class="game-card ${g.cat.cls}${isWatched?' is-watched':''}${g===bestPick?' best-pick':''}" style="animation-delay:${i*0.04}s;flex-wrap:wrap;">
                <div class="teams" style="flex:1;min-width:0;">
                  <div class="matchup">${g.home} <span class="vs">vs</span> ${g.away}</div>
                  <div class="game-meta">${g.date} · ${g.league}</div>
                </div>
                ${g===bestPick ? '<div class="best-pick-badge">⭐ Top Pick</div>' : ''}
                <div class="cat-badge">${g.cat.icon} ${g.cat.label}</div>
                <button class="reveal-btn" onclick="toggleTennisScore(this,'${safeScore}')">👁 Reveal</button>
                <div class="score-reveal" style="font-family:'Outfit',sans-serif;font-size:11px;white-space:normal;max-width:130px;line-height:1.4;text-align:right;"></div>
                <button class="watched-btn${isWatched?' watched':''}" title="Mark as watched" onclick="toggleWatched(this,'${safeId}')">✓</button>
              </div>`;
          });
        });
      });
    }

    // Upcoming — filter by tour too
    const upcomingFiltered = tour === 'all' ? upcoming : upcoming.filter(g => g.league === tour);
    if (upcomingFiltered.length > 0) {
      html += `<div class="upcoming-divider">📅 Coming Up</div>`;
      const byLeague = {};
      upcomingFiltered.forEach(g => {
        if (!byLeague[g.league]) byLeague[g.league] = [];
        byLeague[g.league].push(g);
      });
      Object.entries(byLeague).forEach(([league, games]) => {
        html += `<div class="league-heading">${league === 'ATP' ? '🎾 ATP' : '🎾 WTA'} — ${league}</div>`;
        html += games.map((g, i) => `
          <div class="upcoming-card" style="animation-delay:${i*0.04}s">
            <div class="teams">
              <div class="matchup">${g.home} <span class="vs">vs</span> ${g.away}</div>
              <div class="game-meta">${g.tournament || g.league}</div>
              <div class="kickoff-time">🕐 ${g.time}</div>
            </div>
            <div class="upcoming-badge">📅 Upcoming</div>
          </div>`).join('');
      });
    }

    container.innerHTML = html;
  }

  let activeSport = localStorage.getItem('activeSport') || 'football';

  function switchSport(sport, tabEl) {
    if (hiddenSports.has(sport)) return;
    activeSport = sport;
    localStorage.setItem('activeSport', sport);
    document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sport-panel').forEach(p => p.classList.remove('active'));
    tabEl.classList.add('active');
    document.getElementById(`panel-${sport}`)?.classList.add('active');
    renderTopPicks();
  }

  initSpoilerPill();
  loadScores();

  // PWA service worker registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

</script>
</body>
</html>
